version: '3.8'

services:
  # Structural Node Application Backend
  aura-moby-engine:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./etc/nginx:/etc/nginx:ro
    environment:
      - NODE_ENV=production
      - DB_HOST=aura-db
    depends_on:
      aura-db:
        condition: service_healthy
    networks:
      - aura-network

  # Decentralized Database Schema Hook
  aura-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aura_node_telemetry
      POSTGRES_USER: aura_admin
      POSTGRES_PASSWORD: secure_node_token_2026
    volumes:
      # Maps the custom initialization script into the container boot pathway
      - ./—01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - aura-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura_admin -d aura_node_telemetry"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aura-network

networks:
  aura-network:
    driver: bridge

volumes:
  aura-db-data:
